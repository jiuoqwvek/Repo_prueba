name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    
    - name: Install backend dependencies
      run: |
        pip install -r backend/requirements.txt
    
    - name: Validate syntax
      run: |
        python -m py_compile backend/app.py backend/metrics.py backend/database.py backend/guardrails.py
    
    - name: Install monitoring dependencies
      run: |
        pip install -r monitoring/requirements.txt
    
    - name: Validate monitoring syntax
      run: |
        python -m py_compile monitoring/dashboard.py scripts/test_metrics.py
